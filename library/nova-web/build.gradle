plugins {
    id 'java-library'
}

java {
    toolchain {
        // 빌드, 테스트, 실행에 사용할 Java 버전을 21로 강제합니다.
        languageVersion = JavaLanguageVersion.of(21)
    }
}

dependencies {
    // 1. 핵심 토대 의존성
    implementation project(':library:nova-core')

    // 2. Web MVC & Servlet (NovaLocaleResolver 등을 위해 필요)
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // 3. Validation (Controller 파라미터 검증용)
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // 4. 자동 설정 인프라
    implementation 'org.springframework.boot:spring-boot-autoconfigure'
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'

    // 3. Swagger UI (SpringDoc 2.8.5)
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.4'


    // 4. Annotation Processors
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
}